<!DOCTYPE html>
<html>
<head>

<title>OCARC Storm Reports Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body {
margin:0;
font-family: Arial, Helvetica, sans-serif;
}

#navbar {
background-color:#222;
color:white;
padding:12px;
font-size:20px;
}

#map {
height:90vh;
width:100%;
}

</style>

</head>

<body>

<div id="navbar">
OCARC Weather Center |
<a href="index.html" style="color:white;">Home</a> |
<a href="stormmap.html" style="color:white;">Storm Map</a> |
<a href="https://kb9ohy.blogspot.com" style="color:white;">OCARC</a>
</div>

<div id="map"></div>

<script>

var map = L.map('map').setView([38.55, -86.47], 9);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '© OpenStreetMap'
}).addTo(map);

fetch("https://opensheet.elk.sh/1gibjXPu6Js8j045xaxZJc7ortC6HA51aJgH-nghKvDk/Form%20Responses%201")
.then(res => res.json())
.then(data => {

    data.forEach(function(row){

        var coords = row["Coordinates"];
        if(!coords) return;

        coords = coords.trim();

        // CASE 1: looks like lat,lng coordinates
        if(coords.match(/^[-+]?[0-9]*\.?[0-9]+,\s*[-+]?[0-9]*\.?[0-9]+$/)){

            var parts = coords.split(",");
            var lat = parseFloat(parts[0].trim());
            var lon = parseFloat(parts[1].trim());

            addMarker(lat, lon, row);

        } 
        // CASE 2: address / city,state
        else {
            var url = "https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(coords);

            fetch(url)
            .then(res => res.json())
            .then(result => {
                if(result.length > 0){
                    var lat = parseFloat(result[0].lat);
                    var lon = parseFloat(result[0].lon);
                    addMarker(lat, lon, row);
                }
            })
            .catch(err => console.error("Geocoding error:", err));
        }

    });

});

function addMarker(lat, lon, row){
    var callsign = row["Amateur Radio Callsign"] || "Unknown";
    var weather = row["Type of WX Event"] || "Unknown";

    // Pick the most descriptive note field available
    var notes = row["What kind of flooding was observed"] ||
                row["Wind Damage Estimates"] ||
                row["Hail Size"] ||
                row["High Wind Speeds (Estimated)"] ||
                row["You may upload photos of the damage observed"] ||
                "";

    var popupText = "<b>Callsign:</b> " + callsign +
                    "<br><b>Weather:</b> " + weather +
                    "<br><b>Notes:</b> " + notes;

    var marker = L.marker([lat, lon]).addTo(map);
    marker.bindPopup(popupText);
}

</script>

</body>
</html>
