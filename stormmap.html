<!DOCTYPE html>
<html>
<head>
    <title>OCARC Storm Reports Map</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        #navbar {
            background-color: #222;
            color: white;
            padding: 12px;
            font-size: 20px;
        }

        #map {
            height: 90vh;
            width: 100%;
        }
    </style>
</head>

<body>

<div id="navbar">
    OCARC Weather Center |
    <a href="index.html" style="color:white;">Home</a> |
    <a href="stormmap.html" style="color:white;">Storm Map</a> |
    <a href="https://kb9ohy.blogspot.com" style="color:white;">OCARC</a>
</div>

<div id="map"></div>

<script>

/********************
 * MAP INITIALIZATION
 ********************/
var map = L.map('map').setView([38.548, -86.622], 9);

var baseMap = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '© OpenStreetMap'
}).addTo(map);

/********************
 * ICONS
 ********************/
function makeIcon(url) {
    return L.icon({
        iconUrl: url,
        iconSize: [32, 32],
        iconAnchor: [16, 32],
        popupAnchor: [0, -32]
    });
}

var tornadoIcon = makeIcon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/tornado.png');
var hailIcon = makeIcon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/hail.png');
var windIcon = makeIcon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/wind.png');
var powerIcon = makeIcon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/power.png');
var floodIcon = makeIcon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/flood.png');
var snowIcon = makeIcon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/snow.png');
var funnelIcon = makeIcon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/funnel.png');

/********************
 * RADAR LAYER
 ********************/
var radarLayer = L.tileLayer(
    "https://tilecache.rainviewer.com/v2/radar/latest/256/{z}/{x}/{y}/2/1_1.png",
    {
        tileSize: 256,
        opacity: 0.6,
        attribution: "Radar © RainViewer"
    }
);

radarLayer.addTo(map);

/********************
 * NWS ALERTS
 ********************/
var nwsLayer = L.geoJSON(null, {
    style: function(feature) {
        return {
            color: "red",
            weight: 2,
            fillOpacity: 0.1
        };
    },
    onEachFeature: function(feature, layer) {
        if (feature.properties) {
            layer.bindPopup(
                "<b>" + (feature.properties.event || "Alert") + "</b><br>" +
                (feature.properties.headline || "")
            );
        }
    }
}).addTo(map);

function loadNWS() {
    fetch("https://api.weather.gov/alerts/active", {
        headers: {
            "Accept": "application/geo+json"
        }
    })
    .then(res => res.json())
    .then(data => {
        nwsLayer.clearLayers();
        nwsLayer.addData(data.features || []);
    })
    .catch(err => console.error("NWS load error:", err));
}

loadNWS();
setInterval(loadNWS, 60000);

/********************
 * LAYERS CONTROL
 ********************/
var overlayMaps = {
    "Radar": radarLayer,
    "NWS Alerts": nwsLayer
};

L.control.layers(null, overlayMaps).addTo(map);

/********************
 * MARKERS
 ********************/
var markers = L.layerGroup().addTo(map);

function addMarker(lat, lon, row) {

    var callsign = row["Amateur Radio Callsign"] || "Unknown";
    var weather = row["Type of WX Event"] || "Unknown";

    var notes = row["Notes"] || "";

    var location =
        row["Coordinates"] ||
        row["Electric Provider in outage area"] ||
        row["Snow total (Inches)"] ||
        row["Wind Damage Estimates"] ||
        row["Hail Size"] ||
        row["High Wind Speeds (Estimated)"] ||
        "Unknown";

    var popupText =
        "<b>Callsign:</b> " + callsign +
        "<br><b>Weather:</b> " + weather +
        "<br><b>Location:</b> " + location +
        "<br><b>Notes:</b> " + notes;

    var iconToUse = L.icon({
        iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34]
    });

    var w = weather.toLowerCase();

    if (w.includes('tornado')) iconToUse = tornadoIcon;
    else if (w.includes('funnel')) iconToUse = funnelIcon;
    else if (w.includes('hail')) iconToUse = hailIcon;
    else if (w.includes('flood')) iconToUse = floodIcon;
    else if (w.includes('snow')) iconToUse = snowIcon;
    else if (w.includes('wind')) iconToUse = windIcon;
    else if (w.includes('power')) iconToUse = powerIcon;

    L.marker([lat, lon], { icon: iconToUse })
        .bindPopup(popupText)
        .addTo(markers);
}

/********************
 * SHEET DATA
 ********************/
fetch("https://opensheet.elk.sh/1gibjXPu6Js8j045xaxZJc7ortC6HA51aJgH-nghKvDk/Form%20Responses%201")
.then(res => res.json())
.then(data => {

    data.forEach(function(row) {

        var coords = (row["Coordinates"] || "").trim();
        if (!coords) return;

        // CASE 1: lat/lon
        if (/^[-+]?\d*\.?\d+,\s*[-+]?\d*\.?\d+$/.test(coords)) {
            var parts = coords.split(",");
            addMarker(parseFloat(parts[0]), parseFloat(parts[1]), row);
        }

        // CASE 2: geocode
        else {
            var url = "https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(coords);

            fetch(url)
                .then(res => res.json())
                .then(result => {
                    if (result.length > 0) {
                        addMarker(parseFloat(result[0].lat), parseFloat(result[0].lon), row);
                    }
                })
                .catch(err => console.error("Geocode error:", err));
        }

    });

});

/********************
 * PAGE REFRESH (OPTIONAL)
 ********************/
setInterval(function() {
    location.reload();
}, 60000);

</script>

</body>
</html>
