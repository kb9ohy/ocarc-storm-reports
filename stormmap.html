<!DOCTYPE html>
<html>
<head>

<title>OCARC Storm Reports Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body {
margin:0;
font-family: Arial, Helvetica, sans-serif;
}

#navbar {
background-color:#222;
color:white;
padding:12px;
font-size:20px;
}

#map {
height:90vh;
width:100%;
}

</style>

</head>

<body>

<div id="navbar">
OCARC Weather Center |
<a href="index.html" style="color:white;">Home</a> |
<a href="stormmap.html" style="color:white;">Storm Map</a> |
<a href="https://kb9ohy.blogspot.com" style="color:white;">OCARC</a>
</div>

<div id="map"></div>

<script>

// Define custom icons
var tornadoIcon = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/tornado.png',
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -32]
});

var hailIcon = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/hail.png',
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -32]
});

var windIcon = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/wind.png',
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -32]
});

var powerIcon = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/power.png',
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -32]
});
    
var map = L.map('map').setView([38.55, -86.47], 9);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '© OpenStreetMap'
}).addTo(map);

fetch("https://opensheet.elk.sh/1gibjXPu6Js8j045xaxZJc7ortC6HA51aJgH-nghKvDk/Form%20Responses%201")
.then(res => res.json())
.then(data => {

    data.forEach(function(row){

        var coords = row["Coordinates"];
        if(!coords) return;

        coords = coords.trim();

        // CASE 1: coordinates
        if(coords.match(/^[-+]?[0-9]*\.?[0-9]+,\s*[-+]?[0-9]*\.?[0-9]+$/)){

            var parts = coords.split(",");
            var lat = parseFloat(parts[0].trim());
            var lon = parseFloat(parts[1].trim());

            console.log("Coordinate marker:", coords);
            addMarker(lat, lon, row);

        } 
        // CASE 2: address
        else {
            console.log("Attempting geocode for:", coords);

            var url = "https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(coords);

            fetch(url)
            .then(res => res.json())
            .then(result => {
                console.log("Geocode result for:", coords, result);

                if(result.length > 0){
                    var lat = parseFloat(result[0].lat);
                    var lon = parseFloat(result[0].lon);
                    addMarker(lat, lon, row);
                } else {
                    console.warn("No coordinates found for:", coords);
                }
            })
            .catch(err => console.error("Geocoding error:", coords, err));
        }

    });

});

function addMarker(lat, lon, row){
    var callsign = row["Amateur Radio Callsign"] || "Unknown";
    var weather = row["Type of WX Event"] || "Unknown";

    var notes = row["What kind of flooding was observed"] ||
                row["Wind Damage Estimates"] ||
                row["Hail Size"] ||
                row["High Wind Speeds (Estimated)"] ||
                row["You may upload photos of the damage observed"] ||
                "";

    var popupText = "<b>Callsign:</b> " + callsign +
                    "<br><b>Weather:</b> " + weather +
                    "<br><b>Notes:</b> " + notes;

    // Choose icon based on weather type
    var iconToUse;
    switch(weather.toLowerCase()){
        case 'tornado':
            iconToUse = tornadoIcon;
            break;
        case 'hail':
            iconToUse = hailIcon;
            break;
        case 'wind':
        case 'high wind':
        case 'wind damage':
            iconToUse = windIcon;
            break;
        case 'power outage':
            iconToUse = powerIcon;
            break;
        default:
            iconToUse = L.icon({iconUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png', iconSize:[25,41], iconAnchor:[12,41], popupAnchor:[1,-34]});
    }

    var marker = L.marker([lat, lon], {icon: iconToUse}).addTo(map);
    marker.bindPopup(popupText);
}

</script>

</body>
</html>
