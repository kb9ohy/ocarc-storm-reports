<!DOCTYPE html>
<html>
<head>

<title>OCARC Storm Reports Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body {
margin:0;
font-family: Arial, Helvetica, sans-serif;
}

#navbar {
background-color:#222;
color:white;
padding:12px;
font-size:20px;
}

#map {
height:90vh;
width:100%;
}

</style>

</head>

<body>

<div id="navbar">
OCARC Weather Center |
<a href="index.html" style="color:white;">Home</a> |
<a href="stormmap.html" style="color:white;">Storm Map</a> |
<a href="https://kb9ohy.blogspot.com" style="color:white;">OCARC</a>
</div>

<div id="map"></div>

<script>

var map = L.map('map').setView([38.55, -86.47], 9);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 18,
attribution: '© OpenStreetMap'
}).addTo(map);

fetch("https://opensheet.elk.sh/1gibjXPu6Js8j045xaxZJc7ortC6HA51aJgH-nghKvDk/Form%20Responses%201")
.then(res => res.json())
.then(data => {

data.forEach(function(row){

var location = row["Coordinates"];

if(location){

var coords = location.split(",");

var lat = parseFloat(coords[0]);
var lon = parseFloat(coords[1]);

var marker = L.marker([lat, lon]).addTo(map);

marker.bindPopup(
"<b>Callsign:</b> " + row["Callsign"] +
"<br><b>Weather:</b> " + row["Weather Type"] +
"<br><b>Notes:</b> " + row["Notes"]
);

}

});

});

</script>

</body>
</html>
