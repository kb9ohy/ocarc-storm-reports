<!DOCTYPE html>
<html>
<head>
<title>OCARC Storm Reports Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#navbar { background:#222; color:white; padding:12px; font-size:20px; }
#map { height:90vh; }

.legend {
    background:white;
    padding:10px;
    border-radius:5px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}
.legend i {
    width:18px;
    height:18px;
    float:left;
    margin-right:8px;
}
</style>
</head>

<body>

<div id="navbar">OCARC Weather Center</div>
<div id="map"></div>

<script>

/******** MAP ********/
var map = L.map('map').setView([38.55,-86.6],9);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:18
}).addTo(map);

/******** COUNTIES ********/
var countyLayer = L.geoJSON(null,{
    style:()=>({color:"#555",weight:1,fillOpacity:0.05})
}).addTo(map);

fetch("https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json")
.then(r=>r.json())
.then(d=>countyLayer.addData(d));

/******** TARGET COUNTIES ********/
var targetCounties = [
"INC117","INC037","INC175","INC025","INC043","INC093"
];

/******** COUNTY CENTERS ********/
var countyCenters = {
"INC117":[38.54,-86.50],
"INC037":[38.39,-86.93],
"INC175":[38.61,-86.10],
"INC025":[38.29,-86.47],
"INC043":[38.21,-86.12],
"INC093":[38.86,-86.50]
};

/******** ALERT TRACKING ********/
var countyAlertStatus = {};
var nwsLayer = L.layerGroup().addTo(map);

function loadNWS(){

fetch("https://api.weather.gov/alerts/active",{
headers:{"Accept":"application/geo+json"}
})
.then(r=>r.json())
.then(data=>{

nwsLayer.clearLayers();
countyAlertStatus = {};

data.features.forEach(f=>{

var props=f.properties||{};
var ugc=(props.geocode && props.geocode.UGC)||[];

var matchedCounties=[];

/******** MATCH COUNTY OR ANY INDIANA ZONE ********/
var match = ugc.some(code =>
    targetCounties.includes(code) || code.startsWith("INZ")
);

if(!match) return;

/******** APPLY ALERT TO ALL TARGET COUNTIES ********/
matchedCounties = targetCounties.slice();

/******** DETERMINE SEVERITY ********/
var level="advisory";
if(props.event.toLowerCase().includes("warning")) level="warning";
else if(props.event.toLowerCase().includes("watch")) level="watch";

/******** STORE HIGHEST SEVERITY ********/
matchedCounties.forEach(code=>{
if(!countyAlertStatus[code]) countyAlertStatus[code]=level;
else{
if(level==="warning") countyAlertStatus[code]="warning";
else if(level==="watch" && countyAlertStatus[code]!=="warning"){
countyAlertStatus[code]="watch";
}
}
});

/******** DRAW ALERT ********/
if(f.geometry){
L.geoJSON(f,{
style:{color:"red",weight:2,fillOpacity:0.15}
})
.bindPopup("<b>"+props.event+"</b><br>"+props.areaDesc)
.addTo(nwsLayer);
}else{
matchedCounties.forEach(code=>{
if(countyCenters[code]){
L.marker(countyCenters[code])
.bindPopup("<b>"+props.event+"</b><br>"+props.areaDesc)
.addTo(nwsLayer);
}
});
}

});

updateCountyStyles();

});
}

loadNWS();
setInterval(loadNWS,60000);

/******** COUNTY STYLING ********/
function updateCountyStyles(){
countyLayer.eachLayer(function(layer){
var fips=layer.feature.id;
var county=fips.substring(2);
var ugcCode="IN"+county;

var status=countyAlertStatus[ugcCode];

var style={color:"#555",weight:1,fillOpacity:0.05};

if(status==="warning"){
style.fillColor="red";
style.fillOpacity=0.35;
}
else if(status==="watch"){
style.fillColor="yellow";
style.fillOpacity=0.30;
}
else if(status==="advisory"){
style.fillColor="blue";
style.fillOpacity=0.25;
}

layer.setStyle(style);
});
}

/******** ICONS ********/
function makeIcon(url){
return L.icon({
iconUrl:url,
iconSize:[32,32],
iconAnchor:[16,32],
popupAnchor:[0,-32]
});
}

var tornadoIcon = makeIcon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/tornado.png');
var hailIcon    = makeIcon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/hail.png');
var windIcon    = makeIcon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/wind.png');
var powerIcon   = makeIcon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/power.png');
var floodIcon   = makeIcon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/flood.png');
var snowIcon    = makeIcon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/snow.png');
var funnelIcon  = makeIcon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/funnel.png');

/******** MARKERS ********/
var markers=L.layerGroup().addTo(map);

function addMarker(lat,lon,row){

var callsign=row["Amateur Radio Callsign"]||"Unknown";
var weather=(row["Type of WX Event"]||"Unknown").toLowerCase();

var keys=Object.keys(row);
var notes=[keys[7],keys[8],keys[9],keys[10],keys[11],keys[12]]
.map(k=>row[k])
.filter(v=>v && v.trim()!=="")
.join(" | ");

var popup="<b>"+callsign+"</b><br>"+weather+"<br>"+notes;

var iconUse=L.icon({
iconUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
iconSize:[25,41]
});

if(weather.includes("tornado")) iconUse=tornadoIcon;
else if(weather.includes("funnel")) iconUse=funnelIcon;
else if(weather.includes("hail")) iconUse=hailIcon;
else if(weather.includes("flood")) iconUse=floodIcon;
else if(weather.includes("snow")||weather.includes("ice")) iconUse=snowIcon;
else if(weather.includes("wind")||weather.includes("damage")) iconUse=windIcon;
else if(weather.includes("power")||weather.includes("outage")) iconUse=powerIcon;

L.marker([lat,lon],{icon:iconUse}).bindPopup(popup).addTo(markers);
}

/******** GEOCODING ********/
function geocode(coords,row){

if(coords.toLowerCase().includes("jasper")){
addMarker(38.3914,-86.9311,row);
return;
}

var url="https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(coords+", Indiana");

fetch(url)
.then(r=>r.json())
.then(res=>{
if(res.length>0){
addMarker(parseFloat(res[0].lat),parseFloat(res[0].lon),row);
}
});
}

/******** LOAD REPORTS ********/
fetch("https://opensheet.elk.sh/1gibjXPu6Js8j045xaxZJc7ortC6HA51aJgH-nghKvDk/Form%20Responses%201")
.then(r=>r.json())
.then(data=>{
data.forEach(row=>{
var c=(row["Coordinates"]||"").trim();
if(!c) return;

if(c.match(/^[-+]?\\d*\\.?\\d+,/)){
var p=c.split(",");
addMarker(parseFloat(p[0]),parseFloat(p[1]),row);
}else{
geocode(c,row);
}
});
});

/******** LEGEND ********/
var legend=L.control({position:'bottomright'});
legend.onAdd=function(){
var div=L.DomUtil.create('div','legend');
div.innerHTML=
"<b>Alert Levels</b><br>"+
"<i style='background:red'></i> Warning<br>"+
"<i style='background:yellow'></i> Watch<br>"+
"<i style='background:blue'></i> Advisory";
return div;
};
legend.addTo(map);

</script>

</body>
</html>
