<!DOCTYPE html>
<html>
<head>
<title>OCARC Storm Reports Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#navbar { background:#222; color:white; padding:12px; font-size:20px; }
#map { height:90vh; }

/* Legend */
.legend {
    background:white;
    padding:10px;
    line-height:18px;
    border-radius:5px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}
.legend i {
    width:18px;
    height:18px;
    float:left;
    margin-right:8px;
    opacity:0.7;
}
</style>
</head>

<body>

<div id="navbar">OCARC Weather Center</div>
<div id="map"></div>

<script>

/******** MAP ********/
var map = L.map('map').setView([38.55,-86.6],9);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:18
}).addTo(map);

/******** COUNTIES ********/
var countyLayer = L.geoJSON(null,{
    style:()=>({color:"#555",weight:1,fillOpacity:0.05})
}).addTo(map);

fetch("https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json")
.then(r=>r.json())
.then(d=>countyLayer.addData(d));

/******** COUNTY UGC ********/
var targetCounties = [
"INC117","INC037","INC175","INC025","INC043","INC093"
];

/******** ZONE → COUNTY MAP ********/
var zoneToCounty = {
"INZ051":["INC117","INC037","INC175","INC025","INC043","INC093"]
};

/******** COUNTY CENTERS ********/
var countyCenters = {
"INC117":[38.54,-86.50],
"INC037":[38.39,-86.93],
"INC175":[38.61,-86.10],
"INC025":[38.29,-86.47],
"INC043":[38.21,-86.12],
"INC093":[38.86,-86.50]
};

/******** ALERT STATE ********/
var countyAlertStatus = {};
var nwsLayer = L.layerGroup().addTo(map);

function loadNWS(){

fetch("https://api.weather.gov/alerts/active",{
headers:{"Accept":"application/geo+json"}
})
.then(r=>r.json())
.then(data=>{

nwsLayer.clearLayers();
countyAlertStatus = {};

data.features.forEach(f=>{

var props = f.properties || {};
var ugc = (props.geocode && props.geocode.UGC) || [];

/******** MATCH COUNTY OR ZONE ********/
var matchedCounties = [];

// Direct county match
ugc.forEach(code=>{
if(targetCounties.includes(code)){
matchedCounties.push(code);
}
});

// Zone match → map to counties
ugc.forEach(code=>{
if(zoneToCounty[code]){
matchedCounties = matchedCounties.concat(zoneToCounty[code]);
}
});

if(matchedCounties.length === 0) return;

/******** DETERMINE SEVERITY ********/
var level = "advisory";

if(props.event.toLowerCase().includes("warning")) level = "warning";
else if(props.event.toLowerCase().includes("watch")) level = "watch";

/******** STORE HIGHEST SEVERITY ********/
matchedCounties.forEach(code=>{
if(!countyAlertStatus[code]){
countyAlertStatus[code] = level;
}else{
if(level==="warning") countyAlertStatus[code]="warning";
else if(level==="watch" && countyAlertStatus[code]!=="warning"){
countyAlertStatus[code]="watch";
}
}
});

/******** DRAW ALERT ********/
if(f.geometry){
L.geoJSON(f,{
style:{color:"red",weight:2,fillOpacity:0.15}
})
.bindPopup("<b>"+props.event+"</b><br>"+props.areaDesc)
.addTo(nwsLayer);
}else{
matchedCounties.forEach(code=>{
if(countyCenters[code]){
L.marker(countyCenters[code])
.bindPopup("<b>"+props.event+"</b><br>"+props.areaDesc)
.addTo(nwsLayer);
}
});
}

});

updateCountyStyles();

});
}

loadNWS();
setInterval(loadNWS,60000);

/******** COUNTY STYLING ********/
function updateCountyStyles(){

countyLayer.eachLayer(function(layer){

var fips = layer.feature.id;
var county = fips.substring(2);
var ugcCode = "IN" + county;

var status = countyAlertStatus[ugcCode];

var style = { color:"#555", weight:1, fillOpacity:0.05 };

if(status==="warning"){
style.fillColor="red";
style.fillOpacity=0.35;
}
else if(status==="watch"){
style.fillColor="yellow";
style.fillOpacity=0.30;
}
else if(status==="advisory"){
style.fillColor="blue";
style.fillOpacity=0.25;
}

layer.setStyle(style);

});

}

/******** LEGEND ********/
var legend = L.control({position:'bottomright'});
legend.onAdd = function(){
var div = L.DomUtil.create('div','legend');
div.innerHTML =
"<b>Alert Levels</b><br>" +
"<i style='background:red'></i> Warning<br>" +
"<i style='background:yellow'></i> Watch<br>" +
"<i style='background:blue'></i> Advisory / Statement<br>";
return div;
};
legend.addTo(map);

</script>

</body>
</html>
