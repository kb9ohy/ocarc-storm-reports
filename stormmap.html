<!DOCTYPE html>
<html>
<head>
<title>OCARC Storm Reports Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#navbar { background:#222; color:white; padding:12px; }
#map { height:90vh; }
</style>
</head>

<body>

<div id="navbar">OCARC Weather Center</div>
<div id="map"></div>

<script>

/******** MAP ********/
var map = L.map('map').setView([38.548,-86.622],9);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:18
}).addTo(map);

/******** COUNTIES ********/
var countyLayer = L.geoJSON(null,{
    style:()=>({color:"#555",weight:1,fillOpacity:0.05})
}).addTo(map);

fetch("https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json")
.then(r=>r.json())
.then(d=>countyLayer.addData(d));

/******** NWS ALERTS (FIXED) ********/
var nwsLayer = L.layerGroup().addTo(map);

function loadNWS(){
fetch("https://api.weather.gov/alerts/active",{
    headers:{"Accept":"application/geo+json"}
})
.then(r=>r.json())
.then(data=>{
    nwsLayer.clearLayers();

    data.features.forEach(f=>{
        var p=f.properties||{};

        // CASE 1: polygon alerts
        if(f.geometry){
            L.geoJSON(f,{
                style:{color:"red",weight:2,fillOpacity:0.15}
            })
            .bindPopup("<b>"+p.event+"</b><br>"+p.areaDesc)
            .addTo(nwsLayer);
        }

        // CASE 2: no geometry → fallback marker
        else if(p.geocode && p.geocode.UGC){
            // just drop marker near center of map
            L.marker(map.getCenter())
            .bindPopup("<b>"+p.event+"</b><br>"+p.areaDesc)
            .addTo(nwsLayer);
        }
    });
});
}

loadNWS();
setInterval(loadNWS,60000);

/******** ICONS ********/
function icon(url){
return L.icon({iconUrl:url,iconSize:[32,32],iconAnchor:[16,32]});
}

var tornadoIcon=icon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/tornado.png');
var hailIcon=icon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/hail.png');
var windIcon=icon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/wind.png');
var floodIcon=icon('https://raw.githubusercontent.com/kb9ohy/ocarc-storm-reports/main/icons/flood.png');

/******** MARKERS ********/
var markers=L.layerGroup().addTo(map);

function addMarker(lat,lon,row){

var weather=(row["Type of WX Event"]||"").toLowerCase();

var keys=Object.keys(row);
var notes=[keys[7],keys[8],keys[9],keys[10],keys[11],keys[12]]
.map(k=>row[k]).filter(v=>v).join(" | ");

var popup="<b>"+(row["Amateur Radio Callsign"]||"")+"</b><br>"+notes;

var iconUse=L.icon({
iconUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
iconSize:[25,41]
});

if(weather.includes("tornado")) iconUse=tornadoIcon;
else if(weather.includes("hail")) iconUse=hailIcon;
else if(weather.includes("wind")) iconUse=windIcon;
else if(weather.includes("flood")) iconUse=floodIcon;

L.marker([lat,lon],{icon:iconUse}).bindPopup(popup).addTo(markers);
}

/******** GEOCODING (HARD FIX) ********/
function geocode(coords,row){

// 🔒 HARD FIX FOR JASPER
if(coords.toLowerCase().includes("jasper")){
    addMarker(38.3914,-86.9311,row); // Jasper, IN exact
    return;
}

var url="https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(coords+", Indiana");

fetch(url)
.then(r=>r.json())
.then(res=>{
if(res.length>0){
addMarker(parseFloat(res[0].lat),parseFloat(res[0].lon),row);
}
});
}

/******** SHEET ********/
fetch("https://opensheet.elk.sh/1gibjXPu6Js8j045xaxZJc7ortC6HA51aJgH-nghKvDk/Form%20Responses%201")
.then(r=>r.json())
.then(data=>{
data.forEach(row=>{
var c=(row["Coordinates"]||"").trim();
if(!c) return;

if(c.match(/^[-+]?\\d*\\.?\\d+,/)){
var p=c.split(",");
addMarker(parseFloat(p[0]),parseFloat(p[1]),row);
}else{
geocode(c,row);
}
});
});

</script>

</body>
</html>
