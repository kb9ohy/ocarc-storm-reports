<!DOCTYPE html>
<html>
<head>
<title>OCARC Storm Reports Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#navbar { background:#222; color:white; padding:12px; font-size:20px; }
#map { height:90vh; }
</style>
</head>

<body>

<div id="navbar">OCARC Weather Center</div>
<div id="map"></div>

<script>

/******** MAP ********/
var map = L.map('map').setView([38.55,-86.6],9);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:18
}).addTo(map);

/******** COUNTIES ********/
var countyLayer = L.geoJSON(null,{
    style:()=>({color:"#555",weight:1,fillOpacity:0.05})
}).addTo(map);

fetch("https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json")
.then(r=>r.json())
.then(d=>countyLayer.addData(d));

/******** TARGET COUNTIES ********/
var targetCounties = [
"INC117","INC037","INC175","INC025","INC043","INC093"
];

/******** ALERT STORAGE ********/
var countyAlertStatus = {};
var nwsLayer = L.layerGroup().addTo(map);

/******** PRIORITY ********/
function getPriority(event){
event = event.toLowerCase();

if(event.includes("tornado warning")) return 5;
if(event.includes("severe thunderstorm warning")) return 4;
if(event.includes("flash flood warning")) return 3;
if(event.includes("warning")) return 2;
if(event.includes("watch")) return 1;

return 0;
}

function loadNWS(){

fetch("https://api.weather.gov/alerts/active",{
headers:{"Accept":"application/geo+json"}
})
.then(r=>r.json())
.then(data=>{

nwsLayer.clearLayers();
countyAlertStatus = {};

data.features.forEach(f=>{

var props=f.properties||{};
var ugc=(props.geocode && props.geocode.UGC)||[];

// Only keep alerts that touch our counties
var matched = ugc.filter(code => targetCounties.includes(code));

if(matched.length === 0) return;

var level="advisory";
if(props.event.toLowerCase().includes("warning")) level="warning";
else if(props.event.toLowerCase().includes("watch")) level="watch";

var priority = getPriority(props.event);

// Apply ONLY to affected counties
matched.forEach(code=>{

if(!countyAlertStatus[code]){
countyAlertStatus[code] = { level, priority };
}else{
if(priority > countyAlertStatus[code].priority){
countyAlertStatus[code] = { level, priority };
}
}

});

// Draw polygons
if(f.geometry){
L.geoJSON(f,{
style:{color:"red",weight:2,fillOpacity:0.15}
})
.bindPopup("<b>"+props.event+"</b>")
.addTo(nwsLayer);
}

});

updateCountyStyles();

});
}

loadNWS();
setInterval(loadNWS,60000);

/******** COUNTY STYLE ********/
function updateCountyStyles(){
countyLayer.eachLayer(function(layer){
var fips=layer.feature.id;
var county=fips.substring(2);
var code="IN"+county;

var statusObj = countyAlertStatus[code];
var status = statusObj ? statusObj.level : null;

var style={color:"#555",weight:1,fillOpacity:0.05};

if(status==="warning"){
style.fillColor="red";
style.fillOpacity=0.35;
}
else if(status==="watch"){
style.fillColor="yellow";
style.fillOpacity=0.30;
}
else if(status==="advisory"){
style.fillColor="blue";
style.fillOpacity=0.25;
}

layer.setStyle(style);
});
}

</script>

</body>
</html>
